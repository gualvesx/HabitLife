name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # ── 1. Cria .env com secrets do GitHub ───────────────────────────────
      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "✓ .env created"

      # ── 2. Build web ──────────────────────────────────────────────────────
      - name: Build web app (Vite)
        run: npm run build

      # ── 2. Verifica que o dist tem conteúdo ───────────────────────────────
      - name: Verify dist contents
        run: |
          echo "dist/ contents:"
          ls -la dist/
          echo "dist/assets/ count: $(ls dist/assets/ | wc -l) files"

      # ── 3. Capacitor: add android se não existir, depois sync ─────────────
      - name: Capacitor add + sync android
        run: |
          if [ ! -d "android" ]; then
            echo "android/ not found — running cap add android"
            npx cap add android
          else
            echo "android/ found — skipping cap add"
          fi
          npx cap sync android

      # ── 4. Alarm sound ────────────────────────────────────────────────────
      - name: Copy alarm sound to res/raw
        run: |
          mkdir -p android/app/src/main/res/raw
          cp public/alarm.mp3 android/app/src/main/res/raw/alarm.mp3

      # ── 5. Gera ícones do app (mipmap) a partir do icon-512.png ──────────
      - name: Install Pillow for icon generation
        run: pip install Pillow --break-system-packages -q

      - name: Generate Android launcher icons
        run: |
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = Image.open("public/icon-512.png").convert("RGBA")

          sizes = {
            "mipmap-mdpi":    48,
            "mipmap-hdpi":    72,
            "mipmap-xhdpi":   96,
            "mipmap-xxhdpi":  144,
            "mipmap-xxxhdpi": 192,
          }

          base = "android/app/src/main/res"
          for folder, size in sizes.items():
            path = f"{base}/{folder}"
            os.makedirs(path, exist_ok=True)
            icon = src.resize((size, size), Image.LANCZOS)
            icon.save(f"{path}/ic_launcher.png", "PNG")
            icon.save(f"{path}/ic_launcher_round.png", "PNG")
            print(f"✓ {folder}: {size}x{size}")

          # Foreground for adaptive icon (same image with padding)
          for folder, size in sizes.items():
            path = f"{base}/{folder}"
            fg_size = int(size * 1.0)
            padded = Image.new("RGBA", (int(fg_size*1.5), int(fg_size*1.5)), (0,0,0,0))
            icon = src.resize((fg_size, fg_size), Image.LANCZOS)
            offset = int(fg_size * 0.25)
            padded.paste(icon, (offset, offset), icon)
            padded = padded.resize((int(fg_size*1.5), int(fg_size*1.5)), Image.LANCZOS)
            padded.save(f"{path}/ic_launcher_foreground.png", "PNG")

          print("✓ All icons generated")
          PYEOF

      # ── 6. Adaptive icon XML ──────────────────────────────────────────────
      - name: Create adaptive icon XMLs
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          # Background color = dark purple matching the icon
          mkdir -p android/app/src/main/res/values
          # Only add if not already there
          if ! grep -q "ic_launcher_background" android/app/src/main/res/values/colors.xml 2>/dev/null; then
            echo '<resources><color name="ic_launcher_background">#0A0418</color></resources>' \
              > android/app/src/main/res/values/ic_launcher_colors.xml
          fi

          echo "✓ Adaptive icon XMLs created"

      # ── 7. Build APK ──────────────────────────────────────────────────────
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 8. Rename + upload ────────────────────────────────────────────────
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/HabitLife.apk
          echo "APK size: $(du -sh android/app/build/outputs/apk/debug/HabitLife.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HabitLife-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/HabitLife.apk
          retention-days: 90

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "latest"
          git push origin "latest" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "HabitLife — Última versão"
          body: |
            ## 📱 HabitLife

            **Como instalar:**
            1. Baixe o `HabitLife.apk` abaixo
            2. Android: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra e instale

            > Build #${{ github.run_number }} · commit `${{ github.sha }}`
          files: android/app/build/outputs/apk/debug/HabitLife.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
